<svg viewBox="0 0 600 400" xmlns="http://www.w3.org/2000/svg">
  <!-- Light mode JD Logo -->
  <!-- Background -->
  <rect width="600" height="400" fill="transparent"/>
  
  <!-- Left text: JORDAN -->
  <text x="140" y="220" font-family="Arial, sans-serif" font-size="72" font-weight="bold" fill="#1a1a1a" text-anchor="end" letter-spacing="2">JORDAN</text>
  
  <!-- Center JD Mark -->
  <g transform="translate(300, 200)">
    <!-- J with note stem -->
    <path d="M -40,-80 Q -40,-120 0,-120 Q 40,-120 40,-80 L 40,-20 Q 40,20 0,20 Q -40,20 -40,0" 
          stroke="#1a1a1a" stroke-width="24" fill="none" stroke-linecap="round" stroke-linejoin="round"/>
    
    <!-- Music note dot -->
    <circle cx="-50" cy="40" r="28" fill="#1a1a1a"/>
    
    <!-- D -->
    <path d="M 60,-100 L 60,100 M 60,-100 Q 120,-100 120,0 Q 120,100 60,100" 
          stroke="#1a1a1a" stroke-width="24" fill="none" stroke-linecap="round" stroke-linejoin="round"/>
  </g>
  
  <!-- Right text: D'AMATO -->
  <text x="460" y="220" font-family="Arial, sans-serif" font-size="72" font-weight="bold" fill="#1a1a1a" text-anchor="start" letter-spacing="2">D'AMATO</text>
</svg>
