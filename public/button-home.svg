<svg viewBox="0 0 400 120" xmlns="http://www.w3.org/2000/svg">
  <!-- HOME Button with rounded rectangle background -->
  <rect x="20" y="20" width="360" height="80" rx="20" ry="20" fill="#2a2a2a" stroke="#3a3a3a" stroke-width="2"/>
  
  <!-- Text: Home -->
  <text x="80" y="75" font-family="Poppins, Arial, sans-serif" font-size="40" font-weight="300" fill="#ffffff" letter-spacing="1">Home</text>
  
  <!-- House Icon -->
  <g transform="translate(300, 55)">
    <!-- Roof -->
    <polygon points="0,-25 -35,10 35,10" fill="#e8c5a0" stroke="#d4a574" stroke-width="1.5"/>
    
    <!-- Roof peak -->
    <polygon points="0,-30 -40,5 40,5" fill="none" stroke="#c4815f" stroke-width="1.5"/>
    
    <!-- House body -->
    <rect x="-30" y="10" width="60" height="40" fill="#f5f5f5" stroke="#d0d0d0" stroke-width="1.5"/>
    
    <!-- Door -->
    <rect x="-12" y="25" width="18" height="25" fill="#8b6f47" stroke="#654321" stroke-width="1.5" rx="2"/>
    
    <!-- Door knob -->
    <circle cx="4" cy="37" r="1.5" fill="#d4a574"/>
    
    <!-- Window -->
    <rect x="8" y="20" width="16" height="16" fill="#6ba3d4" stroke="#4a7ba7" stroke-width="1.5" rx="1"/>
    
    <!-- Window cross -->
    <line x1="16" y1="20" x2="16" y2="36" stroke="#4a7ba7" stroke-width="0.75"/>
    <line x1="8" y1="28" x2="24" y2="28" stroke="#4a7ba7" stroke-width="0.75"/>
  </g>
</svg>
